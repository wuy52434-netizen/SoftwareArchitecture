version: '3.9'

services:
  redis:
    image: redis:7
    container_name: library-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: library-backend
    environment:
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=auto-borrow-machine-secret
    volumes:
      - ./backend:/app
    depends_on:
      - redis
    expose:
      - "5001"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: library-nginx
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.docker.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
