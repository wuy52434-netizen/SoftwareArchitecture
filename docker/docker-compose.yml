version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: library-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: library
      MYSQL_USER: library
      MYSQL_PASSWORD: library123
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
      - ../database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - library-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: library-redis
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
      - ./redis.conf:/etc/redis/redis.conf:ro
    command: redis-server /etc/redis/redis.conf
    networks:
      - library-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: library-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
      TZ: Asia/Shanghai
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - library-network
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.11.3
    container_name: library-elasticsearch
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - TZ=Asia/Shanghai
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - library-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: library-nacos
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    environment:
      - MODE=standalone
      - PREFER_HOST_MODE=hostname
      - TZ=Asia/Shanghai
    volumes:
      - nacos-data:/home/nacos/data
    networks:
      - library-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/"]
      interval: 10s
      timeout: 5s
      retries: 5

  sentinel-dashboard:
    image: bladex/sentinel-dashboard
    container_name: library-sentinel
    ports:
      - "8858:8858"
    environment:
      - SENTINEL_AUTH_USERNAME=sentinel
      - SENTINEL_AUTH_PASSWORD=sentinel123
      - TZ=Asia/Shanghai
    networks:
      - library-network

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: library-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - library-network
    depends_on:
      - api-gateway
      - user-service
      - book-service
      - borrow-service

  grafana:
    image: grafana/grafana:11.0.0
    container_name: library-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
      - TZ=Asia/Shanghai
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - library-network
    depends_on:
      - prometheus

  api-gateway:
    build:
      context: ../backend
      dockerfile: Dockerfile.gateway
    container_name: library-api-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - NACOS_SERVER_ADDR=nacos:8848
      - REDIS_HOST=redis
      - SENTINEL_DASHBOARD_SERVER=sentinel-dashboard:8858
      - TZ=Asia/Shanghai
    depends_on:
      nacos:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - library-network
    deploy:
      resources:
        limits:
          memory: 512M

  user-service:
    build:
      context: ../backend
      dockerfile: Dockerfile.user
    container_name: library-user-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - NACOS_SERVER_ADDR=nacos:8848
      - MYSQL_HOST=mysql
      - REDIS_HOST=redis
      - TZ=Asia/Shanghai
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - library-network
    deploy:
      resources:
        limits:
          memory: 512M

  book-service:
    build:
      context: ../backend
      dockerfile: Dockerfile.book
    container_name: library-book-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - NACOS_SERVER_ADDR=nacos:8848
      - MYSQL_HOST=mysql
      - REDIS_HOST=redis
      - ELASTICSEARCH_HOSTS=elasticsearch:9200
      - TZ=Asia/Shanghai
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - library-network
    deploy:
      resources:
        limits:
          memory: 512M

  borrow-service:
    build:
      context: ../backend
      dockerfile: Dockerfile.borrow
    container_name: library-borrow-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - NACOS_SERVER_ADDR=nacos:8848
      - MYSQL_HOST=mysql
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
      - TZ=Asia/Shanghai
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - library-network
    deploy:
      resources:
        limits:
          memory: 768M

  search-service:
    build:
      context: ../backend
      dockerfile: Dockerfile.search
    container_name: library-search-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - NACOS_SERVER_ADDR=nacos:8848
      - ELASTICSEARCH_HOSTS=elasticsearch:9200
      - TZ=Asia/Shanghai
    depends_on:
      nacos:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - library-network
    deploy:
      resources:
        limits:
          memory: 512M

  notify-service:
    build:
      context: ../backend
      dockerfile: Dockerfile.notify
    container_name: library-notify-service
    ports:
      - "8085:8085"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - NACOS_SERVER_ADDR=nacos:8848
      - RABBITMQ_HOST=rabbitmq
      - TZ=Asia/Shanghai
    depends_on:
      nacos:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - library-network
    deploy:
      resources:
        limits:
          memory: 512M

  stats-service:
    build:
      context: ../backend
      dockerfile: Dockerfile.stats
    container_name: library-stats-service
    ports:
      - "8086:8086"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - NACOS_SERVER_ADDR=nacos:8848
      - MYSQL_HOST=mysql
      - REDIS_HOST=redis
      - ELASTICSEARCH_HOSTS=elasticsearch:9200
      - RABBITMQ_HOST=rabbitmq
      - TZ=Asia/Shanghai
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - library-network
    deploy:
      resources:
        limits:
          memory: 512M

  nginx:
    image: nginx:1.27-alpine
    container_name: library-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - api-gateway
    networks:
      - library-network

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
  es-data:
  nacos-data:
  prometheus-data:
  grafana-data:

networks:
  library-network:
    driver: bridge
